<!doctype html><html lang="en-AU"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><title>Payment confirmed — SiteRefresh</title><link rel="icon" href="assets/siterefresh-favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/client-flow.css"></head>
<body><header class="site-header"><div class="header-inner"><a href="/"><img class="logo" src="assets/siterefresh-logo-transparent.png" alt="SiteRefresh"></a></div></header><main class="page-shell"><section class="status-card" id="status-card"><div class="spinner" id="spinner"></div><h1 id="status-title">Confirming your payment…</h1><p id="status-copy">Please keep this page open while Stripe confirms your commencement payment.</p><a class="btn btn-primary" id="onboarding-link" href="#" hidden>Start your project brief</a></section></main>
<script type="module">
const params=new URLSearchParams(location.search);const id=params.get('session_id');const title=document.querySelector('#status-title');const copy=document.querySelector('#status-copy');const spinner=document.querySelector('#spinner');const link=document.querySelector('#onboarding-link');
async function confirm(){try{if(!id||!id.startsWith('cs_'))throw new Error('The payment reference is missing.');const response=await fetch(`/api/stripe/claim-onboarding?session_id=${encodeURIComponent(id)}`);const result=await response.json();if(!response.ok||!result.ok)throw new Error(result.error||'Payment has not been confirmed yet.');spinner.className='status-icon';spinner.textContent='✓';title.textContent='Payment confirmed. Welcome aboard.';copy.textContent='Your 30% commencement payment has been recorded. Complete the project brief so Ryan can begin your website.';link.href=result.onboarding_url;link.hidden=false;}catch(error){spinner.remove();title.textContent='We could not confirm the payment yet.';copy.textContent=`${error.message} If you completed payment, wait a moment and refresh or contact Ryan on 0481 827 200.`;}}
confirm();
</script></body></html>
