<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Got it — SiteRefresh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#121412;--ink2:#33372F;--muted:#5F655D;--bg:#FFFFFF;--line:#E6E8E4;--acc:#A8F04A;--acc-dk:#478A1B;--dark:#0B0C0A;--cream:#F4F6F0;
    --f:'Inter',system-ui,sans-serif;--sh:0 24px 50px -22px rgba(10,12,9,.18)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--f);background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(900px 520px at 80% -10%,rgba(168,240,74,.25),transparent 58%),var(--bg)}
  .card{max-width:560px;width:100%;background:#fff;border:1px solid var(--line);border-radius:26px;padding:52px 44px;text-align:center;box-shadow:var(--sh)}
  .tick{width:72px;height:72px;border-radius:50%;background:var(--acc);display:grid;place-items:center;margin:0 auto 1.6rem}
  h1{font-size:clamp(2rem,6vw,2.7rem);font-weight:800;letter-spacing:-.03em}
  p{color:var(--muted);font-size:1.05rem;line-height:1.65;margin-top:1rem}
  .acts{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;margin-top:2rem}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;padding:.9rem 1.6rem;border-radius:999px;text-decoration:none;transition:transform .16s,background .16s}
  .btn-acc{background:var(--acc);color:#0E100C}.btn-acc:hover{background:var(--acc-dk);color:#fff;transform:translateY(-2px)}
  .btn-ghost{background:#fff;border:1.6px solid var(--line);color:var(--ink)}.btn-ghost:hover{border-color:var(--ink);transform:translateY(-2px)}
  .meta{margin-top:1.8rem;font-size:.85rem;color:var(--muted)}
  .meta a{color:var(--acc-dk);font-weight:600;text-decoration:none}
</style>
</head>
<body>
  <main class="card">
    <div class="tick" aria-hidden="true"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="m5 13 5 5L20 7" stroke="#0E100C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h1>Got it.</h1>
    <p>Your free homepage redesign is in the queue. We'll reply within one business day with a live link you can open on your phone — your brand, brought up to date. No obligation.</p>
    <div class="acts">
      <a class="btn btn-acc" href="/">Back to SiteRefresh</a>
      <a class="btn btn-ghost" href="tel:+61403955231">Call 0403 955 231</a>
    </div>
    <p class="meta">Something urgent? <a href="mailto:hello@siterefresh.com.au">hello@siterefresh.com.au</a></p>
  </main>
</body>
</html>
